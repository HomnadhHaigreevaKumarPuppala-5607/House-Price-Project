<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI House Price Predictor</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Times New Roman', Times, serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* particles */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

/* main layout */

.main{
position:relative;
z-index:1;
width:100%;
padding:60px 20px;
display:flex;
justify-content:center;
align-items:center;
}

/* container */

.container{

width:100%;
max-width:900px;

padding:50px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

border-radius:20px;

box-shadow:
0 0 20px rgba(0,255,255,0.5),
0 0 40px rgba(0,255,255,0.3);

animation:fadeIn 1.5s ease;

}

/* title */

h1{
text-align:center;
margin-bottom:40px;
font-size:36px;
letter-spacing:2px;
}

/* form grid */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* labels */

label{
font-size:14px;
}

/* inputs */

input{

width:100%;
padding:12px;
margin-top:6px;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.15);

color:white;

outline:none;

transition:0.3s;

}

input:focus{

box-shadow:
0 0 10px #00f2ff,
0 0 20px #00f2ff;

}

/* button */

button{

margin-top:30px;

width:100%;
padding:15px;

border:none;
border-radius:12px;

background:linear-gradient(45deg,#00f2ff,#ff00ff);

font-size:18px;
font-weight:bold;

color:white;

cursor:pointer;

transition:0.4s;

}

button:hover{

transform:scale(1.05);

box-shadow:
0 0 20px #00f2ff,
0 0 40px #ff00ff;

}

/* result */

.result{

margin-top:30px;
text-align:center;
font-size:22px;
font-weight:bold;

color:#00ff9d;

}

/* animation */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* responsive */

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="main">

<div class="container">

<h1>🏠 AI House Price Predictor</h1>

<form action="/predict" method="post">

<div class="form-grid">

<div>
<label>Area (sq ft)</label>
<input type="number" name="area" required>
</div>

<div>
<label>Bedrooms</label>
<input type="number" name="bedrooms" required>
</div>

<div>
<label>Bathrooms</label>
<input type="number" name="bathrooms" required>
</div>

<div>
<label>Stories</label>
<input type="number" name="stories" required>
</div>

<div>
<label>Parking</label>
<input type="number" name="parking" required>
</div>

</div>

<button type="submit">Predict Price</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</div>

<script>

particlesJS("particles-js", {

"particles":{

"number":{
"value":90,
"density":{
"enable":true,
"value_area":800
}
},

"color":{
"value":["#00f2ff","#ff00ff","#00ff9d"]
},

"shape":{
"type":"circle"
},

"opacity":{
"value":0.6,
"random":true
},

"size":{
"value":4,
"random":true
},

"line_linked":{
"enable":true,
"distance":150,
"color":"#00f2ff",
"opacity":0.4,
"width":1
},

"move":{
"enable":true,
"speed":2
}

},

"interactivity":{

"events":{
"onhover":{
"enable":true,
"mode":"repulse"
},
"onclick":{
"enable":true,
"mode":"push"
}
},

"modes":{
"repulse":{
"distance":120
},
"push":{
"particles_nb":4
}
}

},

"retina_detect":true

});

</script>

</body>
</html>
